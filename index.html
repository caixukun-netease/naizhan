<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎来到你的奶站</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; overflow:hidden; }
    
    .swiper { height:100vh; }
    
    /* 第一页 */
    .page1 {
      position: relative;
      width: 100%;
      height: 100%;
      background: url('壁纸.png') center/cover no-repeat;
      overflow: hidden;
    }
    
    /* 纯白色气泡（平整、无立体、无色差） */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: #ffffff;           /* 纯白，和参考图一致 */
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: floatUp linear infinite;
      cursor: grab;
      transition: transform 0.3s ease;
    }
    .bubble:hover {
      animation-play-state: paused;
      transform: scale(1.12);
    }
    .bubble img {
      width: 82%;
      height: 82%;
      object-fit: contain;
    }
    
    /* 缓慢上浮动画（无旋转） */
    @keyframes floatUp {
      from { transform: translateY(110vh); }
      to   { transform: translateY(-110vh); }
    }
    
    /* 中央文字（微软雅黑 + 无描边） */
    .welcome {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
    }
    .welcome-text {
      font-size: 5.2rem;
      font-weight: 900;
      color: #ffeb3b;
      text-shadow: 0 8px 15px rgba(0,0,0,0.25);
      letter-spacing: 12px;
      line-height: 1.05;
      font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
    }
  </style>
</head>
<body>

  <div class="swiper" id="mainSwiper">
    <div class="swiper-wrapper">
      <!-- 第一页 -->
      <div class="swiper-slide page1" id="page-1"></div>
    </div>
    <div class="swiper-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const images = [
      "小1.png","小2.png","小3.png","小4.png","小5.png","小6.png",
      "小7.png","小8.png","小9.png","小10.png","小11.png","小12.png",
      "小13.png","小14.png","小15.png","小16.png","小17.png","小18.png"
    ];

    function createBubbles() {
      const container = document.getElementById('page-1');
      const bubbleCount = 6;   // 生成12个，但同时只显示约6个
      
      for (let i = 0; i < bubbleCount; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        const baseSize = 175;
        const size = baseSize + (Math.random() * 52 - 26);
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        
        const left = 5 + (i % 6) * 15 + Math.random() * 8;
        bubble.style.left = `${left}vw`;
        
        // 超慢速度 + 错开出现
        const duration = 20 + Math.random() * 15;   // 20~35秒
        bubble.style.animationDuration = `${duration}s`;
        bubble.style.animationDelay = `-${Math.random() * 25}s`;
        
        const img = document.createElement('img');
        img.src = images[i % images.length];
        bubble.appendChild(img);
        
        container.appendChild(bubble);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      createBubbles();
      
      const welcomeHTML = `
        <div class="welcome">
          <div class="welcome-text">欢迎来到你的奶站</div>
        </div>
      `;
      document.getElementById('page-1').insertAdjacentHTML('beforeend', welcomeHTML);
      
      new Swiper('#mainSwiper', {
        direction: 'vertical',
        loop: false,
        pagination: { el: '.swiper-pagination', clickable: true },
        keyboard: true,
        mousewheel: true,
        touchRatio: 1.2
      });
      
      console.log('✅ 第一页已按最新要求优化完成！');
    });
  </script>
</body>
</html>
