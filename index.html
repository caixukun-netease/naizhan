<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎来到你的奶站</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; overflow:hidden; font-family: system-ui, -apple-system, sans-serif; }
    
    .swiper { height:100vh; }
    
    /* 第一页 */
    .page1 {
      position: relative;
      width: 100%;
      height: 100%;
      background: url('壁纸.png') center/cover no-repeat;
      overflow: hidden;
    }
    
    /* 白色气泡 */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 
        0 15px 25px rgba(0,0,0,0.12),
        inset 20px 20px 25px rgba(255,255,255,0.8),
        inset -15px -15px 20px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: floatUp linear infinite;
      cursor: grab;
      transition: transform 0.3s ease;
    }
    .bubble:hover {
      animation-play-state: paused;
      transform: scale(1.12);
    }
    .bubble img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
    }
    
    /* 上浮 + 轻微左右漂移 */
    @keyframes floatUp {
      from { 
        transform: translateY(110vh) rotate(0deg); 
      }
      to { 
        transform: translateY(-110vh) rotate(360deg); 
      }
    }
    
    /* 中央文字 + 思考小黄 */
    .welcome {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .welcome-text {
      font-size: 4.8rem;
      font-weight: 900;
      color: #ffeb3b;
      text-shadow: 
        0 0 20px #fff,
        4px 4px 0 #333,
        -2px -2px 0 #333,
        6px 6px 8px rgba(0,0,0,0.3);
      letter-spacing: 8px;
      line-height: 1.1;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.25));
      font-family: "Comic Sans MS", cursive, system-ui;
    }
    .thinking-model {
      width: 220px;
      height: 220px;
      margin-top: -40px; /* 让小黄微微“靠”在文字上 */
      filter: drop-shadow(15px 15px 20px rgba(0,0,0,0.3));
    }
  </style>
</head>
<body>

  <div class="swiper" id="mainSwiper">
    <div class="swiper-wrapper">
      <!-- 第一页 -->
      <div class="swiper-slide page1" id="page-1"></div>
    </div>
    <div class="swiper-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const images = [
      "小1.png","小2.png","小3.png","小4.png","小5.png","小6.png",
      "小7.png","小8.png","小9.png","小10.png","小11.png","小12.png",
      "小13.png","小14.png","小15.png","小16.png","小17.png","小18.png"
    ];

    function createBubbles() {
      const container = document.getElementById('page-1');
      const bubbleCount = 22; // 增加数量 + 更好分布
      
      for (let i = 0; i < bubbleCount; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        // 更大尺寸（参考你红圈 + 15%随机）
        let baseSize = 170;
        const size = baseSize + (Math.random() * 50 - 25); // ±15%左右
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        
        // 更智能的水平分布（减少重叠）
        const left = 5 + (i % 6) * 15 + Math.random() * 8;
        bubble.style.left = `${left}vw`;
        
        // 随机动画时长 + 延迟
        const duration = 9 + Math.random() * 12;
        bubble.style.animationDuration = `${duration}s`;
        bubble.style.animationDelay = `-${Math.random() * 18}s`;
        
        // 放入图片
        const img = document.createElement('img');
        img.src = images[i % images.length];
        bubble.appendChild(img);
        
        container.appendChild(bubble);
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      createBubbles();
      
      // 添加中央文字 + 思考小黄
      const welcomeHTML = `
        <div class="welcome">
          <div class="welcome-text">欢迎来到你的奶站</div>
          <div class="thinking-model">
            <img src="小7.png" alt="思考小黄">
          </div>
        </div>
      `;
      document.getElementById('page-1').insertAdjacentHTML('beforeend', welcomeHTML);
      
      new Swiper('#mainSwiper', {
        direction: 'vertical',
        loop: false,
        pagination: { el: '.swiper-pagination', clickable: true },
        keyboard: true,
        mousewheel: true,
        touchRatio: 1.2
      });
      
      console.log('✅ 第一页已优化完成！');
    });
  </script>
</body>
</html>
